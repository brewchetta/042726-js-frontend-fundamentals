<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splide</title>

    <link rel="stylesheet" href="css/main.css">

    <!-- splide -->
    <link rel="stylesheet" href="css/splide.min.css">
    <script defer src="js/splide.min.js"></script>

    <!-- javascript -->
    <script defer src="js/index.js"></script>

</head>
<body>
    
    <h1>Splide</h1>

    <section id="turtles" class="splide" aria-label="Splide Basic HTML Example">
        <div class="splide__track">
            <ul class="splide__list">
                <li class="splide__slide">
                    <img src="img/Eastern_Box_Turtle,_North_Carolina,_US_imported_from_iNaturalist_photo_71168521_(cropped).jpg" alt="Eastern Box Turtle">
                </li>
                <li class="splide__slide">
                    <img src="img/leonardo.jpg" alt="Leonardo Ninja Turtle">
                </li>
                <li class="splide__slide">
                    <img src="img/master_squirtle.jpg" alt="Master Squirtle">
                </li>
                <li class="splide__slide">
                    <img src="img/RSAlligator_Snapping_Turtle_Garry_Tucker_USF.max-800x800.jpg" alt="Snapping Turtle">
                </li>
                <li class="splide__slide">
                    <img src="img/squirtle.jpg" alt="Squirtle">
                </li>
            </ul>
        </div>
    </section>

</body>
</html>
